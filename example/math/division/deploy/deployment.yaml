apiVersion: apps/v1
kind: Deployment
# TODO(team): build a unique namespace for each SUT.
metadata:
  labels:
    app: division
  name: division
spec:
  replicas: 1
  selector:
    matchLabels:
      app: division
  template:
    metadata:
      labels:
        app: division
    spec:
      containers:
      - image: division
        name: division
        args:
        - --subtraction_server=$(SUBTRACTION_SERVICE)
        # Must match the targetPort in service.yaml.
        - --port=50054
        env:
        - name: SUBTRACTION_SERVICE
          valueFrom:
            configMapKeyRef:
              name: division
              key: SUBTRACTION_SERVICE
        imagePullPolicy: Never
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - all
          seccompProfile:
            type: RuntimeDefault
