edition = "2024";

package monax.example.division;

import "google/protobuf/go_features.proto";

option features.(pb.go).api_level = API_OPAQUE;
option go_package = "github.com/openconfig/monax/example/math/division/api";

service Division {
  // Receives two terms and replies with the quotient.
  rpc Divide(DivideRequest) returns (DivideResponse);
}

message DivideRequest {
  // The number that is divided by the divisor.
  int64 dividend = 1;
  // The number that divides the dividend.
  int64 divisor = 2;
}

message DivideResponse {
  // The whole number result of dividing the dividend by the divisor.
  int64 quotient = 1;
  // The remainder of the division.
  int64 remainder = 2;
}
