edition = "2024";

package monax.example.addition;

import "google/protobuf/go_features.proto";

option features.(pb.go).api_level = API_OPAQUE;
option go_package = "github.com/openconfig/monax/example/math/addition/api";

service Addition {
  // Receives two terms and replies with the sum.
  rpc Add(AddRequest) returns (AddResponse);
}

message AddRequest {
  // The number that the addend is added to.
  int64 augend = 1;
  // The number to be added to the augend.
  int64 addend = 2;
}

message AddResponse {
  // The sum of the augend and addend.
  int64 sum = 1;
}
