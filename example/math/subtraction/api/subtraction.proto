edition = "2024";

package monax.example.subtraction;

import "google/protobuf/go_features.proto";

option features.(pb.go).api_level = API_OPAQUE;
option go_package = "github.com/openconfig/monax/example/math/subtraction/api";

service Subtraction {
  // Receives two terms and replies with the difference.
  rpc Subtract(SubtractRequest) returns (SubtractResponse);
}

message SubtractRequest {
  // The number that the subtrahend subtracts from.
  int64 minuend = 1;
  // The number that is subtracted from the minuend.
  int64 subtrahend = 2;
}

message SubtractResponse {
  // The difference of the minuend and the subtrahend.
  int64 difference = 1;
}
