edition = "2023";

package monax.kubernetes;

import "google/protobuf/go_features.proto";
import "proto/monax.proto";

option features.(pb.go).api_level = API_OPAQUE;
option go_package = "github.com/openconfig/monax/runtime/kubernetesruntime/proto";

message KubernetesRuntimeParameters {
  string name = 1;
  KubernetesHandlerParameters kubernetes = 2;
}

message KubernetesHandlerParameters {
  string kubeconfig_path = 1;

  // Information about the Docker host URL and certificates can also be taken
  // from the environment variables:
  // DOCKER_HOST, DOCKER_CERT_PATH, DOCKER_API_VERSION, and DOCKER_TLS_VERIFY.
  // These values take precedence over the environment variables.

  // This is the default Linux value for reference.
  string docker_host_url = 2 [default = "unix:///var/run/docker.sock"];
  string docker_cert_path = 3;

  // The service.spec.type field in the Kubernetes Service object.
  // If unset, defaults to NodePort to support local 'kind' clusters that do not
  // have a load balancer controller (like MetalLB).
  enum ServiceType {
    SERVICE_TYPE_UNSPECIFIED = 0;
    SERVICE_TYPE_NODE_PORT = 1;
    SERVICE_TYPE_LOAD_BALANCER = 2;
  }
  ServiceType service_type = 4 [default = SERVICE_TYPE_NODE_PORT];

  // The address of the container registry to push images to (e.g.,
  // "docker.io/my-repo").
  // If set, the Docker image will be pushed to this address instead of being
  // loaded into a kind cluster.
  // However, if the image name already includes a repository address, this
  // field will be ignored.
  string image_repository_address = 5;
}

message KubernetesComponentParameters {
  string deployment_path = 1;
  string service_path = 2;
  DockerBuildParameters docker =
      3;  // optional, for building images from a Dockerfile
  map<string, string> vars = 4;

  // When true, wait for the replica count to be expected value. The replica
  // count represents the number of pods that should be in a healthy "running"
  // state.
  // Defaults to true if unset.
  bool wait_for_deployment = 5 [default = true];

  // The waiting timeout for the deployment to be in state "running" during
  // Start(). Only used if wait_for_deployment is true.
  // Defaults to 10 minutes if unset.
  int64 wait_for_deployment_timeout_sec = 6 [default = 600];  // 10min

  // When true, wait for the service to return an IP address during Start().
  // Defaults to true if unset.
  bool wait_for_service = 7 [default = true];

  // Timeout for waiting for the service to return an IP address during Start.
  // Only used if wait_for_service is true.
  // Defaults to 5 minutes if unset.
  int64 wait_for_service_timeout_sec = 8 [default = 300];  // 5min

  map<string, monax.Interface> interface_by_port_name = 9;
}

message DockerBuildParameters {
  // The directory containing the service source code. Only files under this
  // directory can be used during the Docker build process.
  // Relative path from the Component txtpb file.
  string context_path = 1;

  // The Dockerfile to use for the Docker build process.
  // Relative path from the context_path.
  string dockerfile_path = 2 [default = "Dockerfile"];

  bool build_image = 3;
  bool load_to_kind = 4;
}
